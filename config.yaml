server:
    host: 0.0.0.0
    port: 5066
endpoints:
    - name: ProviderA
      api_base: https://api.provider-a.com/v1
      api_key: sk-xxxxxxxxx
      enabled: true
    - name: ProviderB
      api_base: https://api.provider-b.com/v1
      api_key: sk-yyyyyyyyy
      enabled: true
pool:
    strategy: round_robin
    max_retries: 2
    health_check_cooldown: 60
    model_cache_ttl: 300
model_aliases:
    My_Pool:
        - endpoint: ProviderA
          model: gpt-4
        - endpoint: ProviderB
          model: gpt-4

